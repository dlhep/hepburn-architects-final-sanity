<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">Common house extension types</title>
<desc id="desc">Five simplified house diagrams showing rear, side, wrap-around, two-storey and front extensions.</desc>
<rect width="1200" height="720" fill="#f7f5f0"/>
<style>.t{font:600 25px Arial,sans-serif;fill:#1d1d1b}.s{font:18px Arial,sans-serif;fill:#555}.h{fill:#fff;stroke:#1d1d1b;stroke-width:4}.r{fill:#d96c2c;stroke:#1d1d1b;stroke-width:4}.roof{fill:#ded9d0;stroke:#1d1d1b;stroke-width:4}.line{stroke:#1d1d1b;stroke-width:4;fill:none}</style>
<text x="60" y="60" class="t">Common house extension types</text>
<g transform="translate(55 120)">
<g><path class="roof" d="M20 95L120 25l100 70z"/><rect class="h" x="35" y="95" width="170" height="120"/><rect class="r" x="70" y="185" width="100" height="65"/><text x="120" y="290" text-anchor="middle" class="t">Rear</text></g>
<g transform="translate(235)"><path class="roof" d="M20 95L120 25l100 70z"/><rect class="h" x="35" y="95" width="170" height="120"/><rect class="r" x="205" y="120" width="70" height="95"/><text x="140" y="290" text-anchor="middle" class="t">Side</text></g>
<g transform="translate(500)"><path class="roof" d="M20 95L120 25l100 70z"/><rect class="h" x="35" y="95" width="170" height="120"/><path class="r" d="M205 120h70v130H70v-65h135z"/><text x="145" y="290" text-anchor="middle" class="t">Wrap-around</text></g>
<g transform="translate(765)"><path class="roof" d="M20 95L120 25l100 70z"/><rect class="h" x="35" y="95" width="170" height="120"/><rect class="r" x="205" y="95" width="80" height="120"/><path class="roof" d="M205 95l40-45 40 45z"/><line class="line" x1="205" y1="155" x2="285" y2="155"/><text x="155" y="290" text-anchor="middle" class="t">Two-storey</text></g>
<g transform="translate(1015)"><path class="roof" d="M0 95L100 25l100 70z"/><rect class="h" x="15" y="95" width="170" height="120"/><rect class="r" x="65" y="160" width="70" height="55"/><text x="100" y="290" text-anchor="middle" class="t">Front</text></g>
</g>
<rect x="60" y="480" width="1080" height="150" rx="18" fill="#fff" stroke="#d4cec4" stroke-width="2"/>
<text x="90" y="535" class="t">Design principle</text>
<text x="90" y="580" class="s">The best form responds to the existing house, planning context, budget and how the completed home needs to work.</text>
</svg>