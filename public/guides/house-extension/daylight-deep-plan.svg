<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">Daylight through a deep extension plan</title><desc id="desc">Three section diagrams compare a dark deep extension, rooflights over the old-new connection and a courtyard solution.</desc>
<rect width="1200" height="720" fill="#f7f5f0"/>
<style>.t{font:600 25px Arial,sans-serif;fill:#1d1d1b}.s{font:18px Arial,sans-serif;fill:#555}.b{fill:#fff;stroke:#1d1d1b;stroke-width:4}.a{fill:#d96c2c}.sun{stroke:#d96c2c;stroke-width:7;stroke-linecap:round}.dim{fill:#b9b3aa}</style>
<text x="60" y="60" class="t">Bringing daylight into a deep plan</text>
<g transform="translate(55 120)">
<g><rect x="0" y="0" width="340" height="430" rx="18" fill="#fff" stroke="#d4cec4" stroke-width="2"/><text x="22" y="42" class="t">Poorly resolved</text><path class="b" d="M35 295V155h120l45-65 45 65h60v140z"/><rect x="35" y="155" width="115" height="140" class="dim"/><rect x="245" y="210" width="60" height="85" class="a"/><text x="22" y="365" class="s">A deep addition can leave</text><text x="22" y="395" class="s">the original middle room dark.</text></g>
<g transform="translate(375)"><rect width="340" height="430" rx="18" fill="#fff" stroke="#d4cec4" stroke-width="2"/><text x="22" y="42" class="t">Rooflight strategy</text><path class="b" d="M35 295V155h120l45-65 45 65h60v140z"/><rect x="245" y="210" width="60" height="85" class="a"/><rect x="172" y="117" width="50" height="14" transform="rotate(-33 197 124)" class="a"/><path class="sun" d="M205 70v40M180 78l14 25M230 78l-14 25"/><text x="22" y="365" class="s">Light from above reaches the</text><text x="22" y="395" class="s">junction between old and new.</text></g>
<g transform="translate(750)"><rect width="340" height="430" rx="18" fill="#fff" stroke="#d4cec4" stroke-width="2"/><text x="22" y="42" class="t">Courtyard strategy</text><path class="b" d="M35 295V155h95l35-50 35 50h105v140z"/><rect x="140" y="190" width="55" height="105" fill="#f7f5f0" stroke="#d96c2c" stroke-width="4"/><path class="sun" d="M168 80v70M145 95l15 28M190 95l-15 28"/><text x="22" y="365" class="s">A small open slot can introduce</text><text x="22" y="395" class="s">light, air and a framed view.</text></g>
</g>
</svg>