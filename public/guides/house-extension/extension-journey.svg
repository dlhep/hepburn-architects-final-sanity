<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
<title id="title">Typical house extension journey</title><desc id="desc">An eight-stage timeline from consultation and survey through design, approvals, construction and completion.</desc>
<rect width="1400" height="620" fill="#f7f5f0"/>
<style>.t{font:600 26px Arial,sans-serif;fill:#1d1d1b}.s{font:18px Arial,sans-serif;fill:#555}.n{fill:#fff;stroke:#1d1d1b;stroke-width:3}.num{fill:#d96c2c}.edge{stroke:#1d1d1b;stroke-width:4}</style>
<text x="60" y="60" class="t">A typical house extension journey</text>
<line x1="110" y1="280" x2="1290" y2="280" class="edge"/>
<g transform="translate(110 280)"><circle r="30" class="num"/><text y="8" text-anchor="middle" fill="#fff" class="t">1</text><rect x="-65" y="55" width="130" height="90" rx="12" class="n"/><text x="0" y="92" text-anchor="middle" class="s">Consultation</text><text x="0" y="120" text-anchor="middle" class="s">&amp; brief</text></g>
<g transform="translate(278 280)"><circle r="30" class="num"/><text y="8" text-anchor="middle" fill="#fff" class="t">2</text><rect x="-65" y="-145" width="130" height="90" rx="12" class="n"/><text x="0" y="-108" text-anchor="middle" class="s">Measured</text><text x="0" y="-80" text-anchor="middle" class="s">survey</text></g>
<g transform="translate(446 280)"><circle r="30" class="num"/><text y="8" text-anchor="middle" fill="#fff" class="t">3</text><rect x="-65" y="55" width="130" height="90" rx="12" class="n"/><text x="0" y="92" text-anchor="middle" class="s">Concept</text><text x="0" y="120" text-anchor="middle" class="s">design</text></g>
<g transform="translate(614 280)"><circle r="30" class="num"/><text y="8" text-anchor="middle" fill="#fff" class="t">4</text><rect x="-65" y="-145" width="130" height="90" rx="12" class="n"/><text x="0" y="-108" text-anchor="middle" class="s">Planning</text><text x="0" y="-80" text-anchor="middle" class="s">route</text></g>
<g transform="translate(782 280)"><circle r="30" class="num"/><text y="8" text-anchor="middle" fill="#fff" class="t">5</text><rect x="-65" y="55" width="130" height="90" rx="12" class="n"/><text x="0" y="92" text-anchor="middle" class="s">Technical</text><text x="0" y="120" text-anchor="middle" class="s">design</text></g>
<g transform="translate(950 280)"><circle r="30" class="num"/><text y="8" text-anchor="middle" fill="#fff" class="t">6</text><rect x="-65" y="-145" width="130" height="90" rx="12" class="n"/><text x="0" y="-108" text-anchor="middle" class="s">Pricing &amp;</text><text x="0" y="-80" text-anchor="middle" class="s">appointment</text></g>
<g transform="translate(1118 280)"><circle r="30" class="num"/><text y="8" text-anchor="middle" fill="#fff" class="t">7</text><rect x="-65" y="55" width="130" height="90" rx="12" class="n"/><text x="0" y="106" text-anchor="middle" class="s">Construction</text></g>
<g transform="translate(1286 280)"><circle r="30" class="num"/><text y="8" text-anchor="middle" fill="#fff" class="t">8</text><rect x="-65" y="-145" width="130" height="90" rx="12" class="n"/><text x="0" y="-108" text-anchor="middle" class="s">Completion</text><text x="0" y="-80" text-anchor="middle" class="s">&amp; records</text></g>
<text x="60" y="565" class="s">Early coordination reduces redesign, uncertain pricing and avoidable decisions during construction.</text>
</svg>